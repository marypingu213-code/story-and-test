<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶石鑑定室有聲書製作平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .rounded-card { border-radius: 2rem; }
        .voice-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 專業列印排版 (遵守圖片規範) */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            @page { margin: 1cm; size: A4; } 
            
            .print-area { display: block !important; width: 100%; }
            .print-header-small { text-align: right; font-size: 9pt; color: #666; margin-bottom: 5px; }
            .print-title-centered { text-align: center; font-size: 16pt; font-weight: bold; margin-bottom: 20px; }
            .print-info-row { border-bottom: 1px solid black; padding-bottom: 8px; margin-bottom: 25px; display: flex; justify-content: center; }
            .print-info-row span { font-size: 12pt; min-width: 250px; text-align: left; }
            
            .print-question-block { page-break-inside: avoid; margin-bottom: 25px; font-size: 12pt; line-height: 1.6; }
            .bracket-space { font-family: monospace; font-size: 14pt; font-weight: bold; margin-right: 12px; }
            .print-option-list { padding-left: 3rem; display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        }

        .print-area { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .book-item:hover { transform: translateY(-3px); transition: all 0.2s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 網頁 UI 區塊 -->
    <div class="max-w-7xl mx-auto no-print">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-bold text-indigo-700 flex items-center gap-2">
                <span>💎</span> 寶石鑑定室有聲書製作平台 <span>💎</span>
            </h1>
            <div class="flex gap-2">
                <button id="saveCloudBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-full font-bold shadow-md flex items-center gap-2 transition-all">
                    <span>💾</span> 鎖定並儲存故事
                </button>
                <button id="openShelfBtn" class="bg-white border-2 border-indigo-100 text-indigo-600 hover:bg-indigo-50 px-5 py-2 rounded-full font-bold shadow-sm flex items-center gap-2 transition-all">
                    <span>📚</span> 我的故事書櫃
                </button>
            </div>
        </header>

        <!-- 上半部：創作與錄音 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-7">
                <div class="bg-white p-6 rounded-card shadow-xl border-4 border-indigo-100 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-slate-700 flex items-center gap-2"><span>✍️</span> 故事內容編輯</h2>
                        <div class="flex space-x-2">
                            <button id="micBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full transition-all shadow-lg flex items-center font-bold">
                                <span id="micIcon" class="mr-2 text-xl">🎤</span><span id="micText">錄音轉文字</span>
                            </button>
                            <button id="clearAllBtn" class="bg-slate-50 hover:bg-slate-100 text-slate-500 px-4 py-2 rounded-full text-sm font-medium">重置頁面</button>
                        </div>
                    </div>
                    <textarea id="storyEditor" class="flex-1 w-full min-h-[400px] p-6 border-2 border-dashed border-indigo-50 rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none text-xl leading-relaxed custom-scroll bg-indigo-50/10" placeholder="在此輸入內容，文字會自動同步至下方檢視區..."></textarea>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white p-6 rounded-card shadow-xl border-4 border-emerald-100 flex flex-col h-full min-h-[500px]">
                    <div class="flex justify-between items-center mb-4 border-b pb-4">
                        <h2 class="text-xl font-bold text-slate-700">🎧 有聲書分段錄製</h2>
                        <div class="flex gap-2">
                            <button id="btnA" class="hidden bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-sm">🔊 產生有聲書</button>
                            <button id="btnB" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-sm">💾 下載完整版</button>
                        </div>
                    </div>
                    <div id="segmentsList" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scroll mt-4 text-center">
                        <div class="flex flex-col items-center justify-center h-full text-slate-300 italic py-10">
                            <span class="text-5xl mb-4">📀</span><p>請開啟麥克風錄製音檔</p>
                        </div>
                    </div>
                    <div id="mergeLoading" class="hidden mt-4 text-center text-sm text-indigo-500 font-bold animate-pulse">💎 處理音檔中...</div>
                </div>
            </div>
        </div>

        <!-- 下半部：五大功能區 -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <!-- 1. 繪本名稱 -->
            <div class="bg-white p-4 rounded-card shadow-lg border-2 border-slate-100 flex flex-col items-center justify-center text-center gap-2 min-h-[180px]">
                <span class="text-3xl">📖</span><label class="text-[10px] text-slate-400 uppercase tracking-widest">1. 繪本名稱</label>
                <input type="text" id="bookTitleInput" class="w-full text-center font-bold text-slate-700 border-b-2 border-indigo-100 focus:border-indigo-400 outline-none px-1" value="圈圈村的故事">
                <div id="bookAudioContainer" class="hidden w-full mt-2"><audio id="bookAudioPlayer" controls class="w-full h-8"></audio></div>
            </div>

            <!-- 2. 內容檢視 -->
            <div class="bg-white p-4 rounded-card shadow-lg border-2 border-slate-100 flex flex-col items-center justify-center text-center gap-2 min-h-[180px]">
                <span class="text-3xl">📝</span><label class="text-[10px] text-slate-400 uppercase tracking-widest">2. 內容檢視</label>
                <div id="fullTextDisplay" class="text-[10px] text-slate-400 h-24 overflow-y-auto px-2 leading-tight custom-scroll italic w-full">尚未錄入內容...</div>
            </div>

            <!-- 3. 題庫調整 -->
            <button id="editBankBtn" class="bg-white hover:bg-sky-50 p-4 rounded-card shadow-lg border-2 border-slate-100 flex flex-col items-center justify-center text-center gap-2 transition-all group min-h-[180px]">
                <span class="text-3xl group-hover:rotate-12 transition-all">⚙️</span>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest">3. 題庫與語句調整</label>
                <span class="text-sky-600 font-bold text-sm">編輯完整題庫</span>
            </button>

            <!-- 4. 線上測驗 -->
            <button id="startQuizBtn" class="bg-orange-500 hover:bg-orange-600 p-4 rounded-card shadow-xl flex flex-col items-center justify-center text-center gap-2 text-white border-4 border-orange-400 min-h-[180px] transition-all">
                <span class="text-3xl">📝</span><label class="text-[10px] opacity-80 uppercase text-white font-bold">4. 立即線上測驗</label>
                <span class="font-bold text-sm">開始挑戰答題</span>
            </button>

            <!-- 5. A4 列印 -->
            <button id="printBtn" class="bg-emerald-50 hover:bg-emerald-100 p-4 rounded-card shadow-lg border-2 border-emerald-100 flex flex-col items-center justify-center text-center gap-2 text-emerald-700 min-h-[180px] transition-all">
                <span class="text-3xl">🖨️</span><label class="text-[10px] opacity-60 uppercase">5. 列印 A4 測驗卷</label>
                <span class="font-bold text-sm">輸出紙本測驗</span>
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="shelfModal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 no-print backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-card shadow-2xl p-8 max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-indigo-600">📚 故事書櫃</h3>
                <button onclick="window.closeShelf()" class="text-slate-400 hover:text-slate-600 text-3xl font-bold">&times;</button>
            </div>
            <div id="shelfList" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scroll"></div>
        </div>
    </div>

    <div id="quizModal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 no-print backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-card shadow-2xl p-8 max-h-[90vh] overflow-y-auto border-t-8 border-orange-500">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-orange-600">💎 寶石挑戰賽 💎</h3>
                <button onclick="window.closeQuiz()" class="text-slate-400 hover:text-slate-600 text-3xl font-bold">&times;</button>
            </div>
            <div id="quizBody" class="space-y-6"></div>
            <div id="quizFooter" class="mt-8 flex justify-between items-center gap-4 border-t pt-4">
                <p id="quizProgress" class="text-slate-500 font-bold">第 1 / 5 題</p>
                <div id="feedbackMsg" class="font-bold text-lg"></div>
                <button id="nextBtn" class="hidden bg-indigo-600 text-white px-8 py-2 rounded-full font-bold shadow-md">下一題 ➡️</button>
                <button id="restartBtn" class="hidden bg-emerald-600 text-white px-8 py-2 rounded-full font-bold shadow-md">重新抽題</button>
            </div>
        </div>
    </div>

    <div id="bankModal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 no-print backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl rounded-card shadow-2xl p-8 max-h-[90vh] overflow-y-auto border-t-8 border-sky-500">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-sky-600">⚙️ 編輯測驗題庫</h3>
                <button onclick="window.closeBank()" class="text-slate-400 hover:text-slate-600 text-3xl font-bold">&times;</button>
            </div>
            <div id="bankEditorList" class="space-y-8"></div>
            <div class="mt-8 pt-4 border-t flex justify-end gap-2">
                <button onclick="window.addQuestion()" class="bg-indigo-50 text-indigo-600 px-6 py-2 rounded-full font-bold">➕ 新增題目</button>
                <button onclick="window.saveBank()" class="bg-sky-600 text-white px-10 py-2 rounded-full font-bold shadow-lg">💾 儲存並關閉</button>
            </div>
        </div>
    </div>

    <!-- 紙本列印區域 -->
    <div id="paperOutput" class="print-area">
        <div class="print-header-small">寶石鑑定室有聲書製作平台</div>
        <div class="print-title-centered" id="printQuizTitle">《未命名故事》閱讀理解測驗卷</div>
        <div class="print-info-row">
            <span>姓名：____________________</span>
        </div>
        <div id="printQuestionContainer"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, getDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 初始化 ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // --- 狀態變數 ---
        let user = null;
        let questionBank = [
            { q: "從天空中往下看，圈圈村的形狀看起來像什麼呢？", options: ["一個大三角形", "一個甜甜圈", "一塊大餅乾", "一顆愛心"], ans: 1 },
            { q: "圈圈村的人，長相通常具備什麼特徵？", options: ["全身上下都是尖尖的", "鼻子、眼睛、臉都是圓圓的", "每個標記都是尖的", "他們長得非常高大"], ans: 1 },
            { q: "下列哪一個不是圈圈村裡「圓圓的東西」？", options: ["鵝卵石", "路燈", "長椅", "尖尖的鐵剪刀"], ans: 3 }
        ];
        let segments = []; 
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let recognition = null;

        const storyEditor = document.getElementById('storyEditor');
        const fullTextDisplay = document.getElementById('fullTextDisplay');
        const bookTitleInput = document.getElementById('bookTitleInput');
        const bookAudioPlayer = document.getElementById('bookAudioPlayer');

        // --- 全域函數掛載 (核心修復) ---
        window.removeSeg = (idx) => { segments.splice(idx, 1); renderSegments(); };
        window.closeShelf = () => document.getElementById('shelfModal').classList.add('hidden');
        window.closeQuiz = () => document.getElementById('quizModal').classList.add('hidden');
        window.closeBank = () => document.getElementById('bankModal').classList.add('hidden');

        // --- 文字同步預覽 ---
        storyEditor.addEventListener('input', () => {
            fullTextDisplay.innerText = storyEditor.value || "尚未輸入內容...";
        });

        // --- 錄音與語音轉文字 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';
            recognition.onresult = (e) => {
                let final = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                }
                if (final) {
                    const separator = (storyEditor.value.trim() && !/[。！？]$/.test(storyEditor.value.trim())) ? '，' : ' ';
                    storyEditor.value = (storyEditor.value.trim() ? storyEditor.value.trim() + separator : "") + final;
                    fullTextDisplay.innerText = storyEditor.value;
                }
            };
        }

        document.getElementById('micBtn').addEventListener('click', async () => {
            if (isRecording) {
                if (mediaRecorder) mediaRecorder.stop();
                if (recognition) recognition.stop();
                isRecording = false;
                document.getElementById('micBtn').classList.remove('voice-active');
                document.getElementById('micText').innerText = "錄音轉文字";
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        segments.push({ blob, url: URL.createObjectURL(blob) });
                        renderSegments();
                    };
                    mediaRecorder.start();
                    if (recognition) recognition.start();
                    isRecording = true;
                    document.getElementById('micBtn').classList.add('voice-active');
                    document.getElementById('micText').innerText = "錄音中...點擊停止";
                } catch (err) { alert("無法開啟麥克風，請確認權限。"); }
            }
        });

        function renderSegments() {
            const list = document.getElementById('segmentsList');
            const btnA = document.getElementById('btnA');
            const btnB = document.getElementById('btnB');
            if (segments.length > 0) { btnA.classList.remove('hidden'); btnB.classList.remove('hidden'); }
            else { btnA.classList.add('hidden'); btnB.classList.add('hidden'); }
            
            list.innerHTML = segments.map((seg, i) => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <span class="bg-indigo-600 text-white w-7 h-7 rounded-full text-[10px] flex items-center justify-center font-bold">P${i + 1} ✅</span>
                        <audio src="${seg.url}" controls class="h-8 w-40"></audio>
                    </div>
                    <button class="text-red-400 p-2" onclick="window.removeSeg(${i})">🗑️</button>
                </div>
            `).join('');
            if (segments.length === 0) list.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-300 italic py-10"><p>尚未錄製段落</p></div>`;
        }

        // --- 音檔合併 ---
        document.getElementById('btnA').onclick = async () => {
            document.getElementById('mergeLoading').classList.remove('hidden');
            const blob = await mergeAudios();
            bookAudioPlayer.src = URL.createObjectURL(blob);
            document.getElementById('bookAudioContainer').classList.remove('hidden');
            bookAudioPlayer.play();
            document.getElementById('mergeLoading').classList.add('hidden');
        };

        document.getElementById('btnB').onclick = async () => {
            document.getElementById('mergeLoading').classList.remove('hidden');
            const blob = await mergeAudios();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${bookTitleInput.value}_完整版.wav`;
            a.click();
            document.getElementById('mergeLoading').classList.add('hidden');
        };

        async function mergeAudios() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const buffers = await Promise.all(segments.map(async s => ctx.decodeAudioData(await s.blob.arrayBuffer())));
            const totalLen = buffers.reduce((a, b) => a + b.length, 0);
            const final = ctx.createBuffer(buffers[0].numberOfChannels, totalLen, buffers[0].sampleRate);
            let offset = 0;
            for (const b of buffers) {
                for (let c = 0; c < b.numberOfChannels; c++) final.getChannelData(c).set(b.getChannelData(c), offset);
                offset += b.length;
            }
            return bufferToWav(final);
        }

        // --- Firebase 操作 ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth Fail", err); }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) loadShelf();
        });
        initAuth();

        document.getElementById('saveCloudBtn').onclick = async () => {
            if (!auth.currentUser) return alert("系統登入中...");
            const title = bookTitleInput.value.trim();
            if (!title || title === "未命名故事") return alert("請輸入書名。");
            const bookId = title.replace(/\s+/g, '_');
            const data = { title, text: storyEditor.value, questions: questionBank, lastUpdate: Date.now() };
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', bookId), data);
                alert("已成功儲存故事進度！");
                loadShelf();
            } catch (err) { alert("儲存失敗，請檢查權限。"); }
        };

        const loadShelf = async () => {
            if (!auth.currentUser) return;
            try {
                const snapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'books'));
                document.getElementById('shelfList').innerHTML = snapshot.docs.map(docSnap => {
                    const b = docSnap.data();
                    return `<div class="book-item bg-indigo-50 p-4 rounded-xl cursor-pointer hover:bg-white flex justify-between items-center" onclick="window.switchBook('${docSnap.id}')">
                        <div><div class="font-bold">${b.title}</div><div class="text-[10px] text-slate-400">${new Date(b.lastUpdate).toLocaleString()}</div></div>
                        <span>📖</span>
                    </div>`;
                }).join('');
            } catch (err) {}
        };

        window.switchBook = async (id) => {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id));
            if (snap.exists()) {
                const b = snap.data();
                bookTitleInput.value = b.title;
                storyEditor.value = b.text;
                questionBank = b.questions;
                fullTextDisplay.innerText = b.text;
                segments = []; renderSegments();
                window.closeShelf();
            }
        };

        // --- 題庫與測驗 ---
        document.getElementById('editBankBtn').onclick = () => {
            const list = document.getElementById('bankEditorList');
            list.innerHTML = questionBank.map((q, i) => `
                <div class="p-6 bg-slate-50 rounded-xl border relative">
                    <button class="absolute top-2 right-2 text-red-500 text-sm" onclick="window.delQ(${i})">刪除</button>
                    <div class="mb-4 font-bold">第 ${i+1} 題：<input type="text" class="w-full p-1 mt-1 border" id="q_t_${i}" value="${q.q}"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${[0,1,2,3].map(oi => `<div>選項 ${String.fromCharCode(65+oi)}：<div class="flex items-center gap-1"><input type="text" class="flex-1 p-1 border text-sm" id="q_${i}_o_${oi}" value="${q.options[oi]}"><input type="radio" name="c_${i}" value="${oi}" ${q.ans === oi ? 'checked' : ''}></div></div>`).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('bankModal').classList.remove('hidden');
        };
        window.delQ = (idx) => { questionBank.splice(idx, 1); document.getElementById('editBankBtn').click(); };
        window.addQuestion = () => { questionBank.push({ q: "新題目", options: ["A", "B", "C", "D"], ans: 0 }); document.getElementById('editBankBtn').click(); };
        window.saveBank = () => {
            questionBank = questionBank.map((_, i) => ({
                q: document.getElementById(`q_t_${i}`).value,
                options: [0,1,2,3].map(oi => document.getElementById(`q_${i}_o_${oi}`).value),
                ans: parseInt(document.querySelector(`input[name="c_${i}"]:checked`).value)
            }));
            window.closeBank();
        };

        // 線上測驗
        document.getElementById('startQuizBtn').onclick = () => {
            if (questionBank.length === 0) return alert("題庫是空的！");
            let quiz = [...questionBank].sort(() => Math.random() - 0.5).slice(0, 5).map(item => {
                let opts = item.options.map((text, i) => ({ text, isCorrect: i === item.ans })).sort(() => Math.random() - 0.5);
                return { q: item.q, options: opts.map(o => o.text), ans: opts.findIndex(o => o.isCorrect) };
            });
            let cIdx = 0, score = 0;
            document.getElementById('quizModal').classList.remove('hidden');
            const renderQ = () => {
                const d = quiz[cIdx];
                document.getElementById('quizProgress').innerText = `第 ${cIdx+1} / ${quiz.length} 題`;
                document.getElementById('feedbackMsg').innerText = "";
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('restartBtn').classList.add('hidden');
                document.getElementById('quizBody').innerHTML = `<div class="font-bold p-3 bg-slate-100 border-l-4 border-indigo-500 mb-4 text-lg">${d.q}</div>
                <div class="grid gap-2">${d.options.map((o, i) => `<button id="quiz_opt_${i}" class="text-left p-4 border rounded-xl hover:border-indigo-500 flex items-center gap-3"><span class="bg-slate-200 w-8 h-8 rounded-full flex items-center justify-center font-bold">${String.fromCharCode(65+i)}</span>${o}</button>`).join('')}</div>`;
                d.options.forEach((_, i) => document.getElementById(`quiz_opt_${i}`).onclick = () => {
                    document.querySelectorAll('#quizBody button').forEach(b => b.disabled = true);
                    if (i === d.ans) {
                        document.getElementById(`quiz_opt_${i}`).classList.add('bg-green-100', 'border-green-600');
                        document.getElementById('feedbackMsg').innerHTML = "<span class='text-green-600 font-bold'>✨ 答題正確！</span>";
                        score++;
                    } else {
                        document.getElementById(`quiz_opt_${i}`).classList.add('bg-red-100', 'border-red-600');
                        document.getElementById(`quiz_opt_${d.ans}`).classList.add('bg-green-50', 'border-green-500');
                        document.getElementById('feedbackMsg').innerHTML = "<span class='text-red-600 font-bold'>❌ 答題錯誤！</span>";
                    }
                    if (cIdx < quiz.length - 1) document.getElementById('nextBtn').classList.remove('hidden'); else finish();
                });
            };
            const finish = () => {
                document.getElementById('quizBody').innerHTML = `<div class="text-center py-6"><div class="text-5xl mb-4">🏆</div><h4 class="text-2xl font-bold mb-2">測驗結束</h4><p class="text-indigo-600 font-bold text-xl">總得分：${Math.round(score * (100/quiz.length))} 分</p></div>`;
                document.getElementById('restartBtn').classList.remove('hidden');
            };
            document.getElementById('nextBtn').onclick = () => { cIdx++; renderQ(); };
            document.getElementById('restartBtn').onclick = () => document.getElementById('startQuizBtn').click();
            renderQ();
        };

        // --- 紙本列印 ---
        document.getElementById('printBtn').onclick = () => {
            const container = document.getElementById('printQuestionContainer');
            container.innerHTML = "";
            document.getElementById('printQuizTitle').innerText = `《${bookTitleInput.value}》閱讀理解測驗卷`;
            questionBank.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = "print-question-block";
                let html = `<div><span class="bracket-space">(       )</span> ${index + 1}. ${item.q}</div><div class="print-option-list">`;
                item.options.forEach((opt, i) => { html += `<div>(${String.fromCharCode(65 + i)}) ${opt}</div>`; });
                html += `</div>`;
                qDiv.innerHTML = html;
                container.appendChild(qDiv);
            });
            window.print();
        };

        // UI 輔助
        document.getElementById('openShelfBtn').onclick = () => document.getElementById('shelfModal').classList.remove('hidden');
        document.getElementById('clearAllBtn').onclick = () => { if(confirm("確定重設當前內容？未儲存的內容將遺失。")) location.reload(); };

        function bufferToWav(abuffer) {
            let n = abuffer.numberOfChannels, len = abuffer.length * n * 2 + 44, buf = new ArrayBuffer(len), view = new DataView(buf), chans = [], i, s, o = 0, p = 0;
            const u16 = (d) => { view.setUint16(p, d, true); p += 2; };
            const u32 = (d) => { view.setUint32(p, d, true); p += 4; };
            u32(0x46464952); u32(len - 8); u32(0x45564157); u32(0x20746d66); u32(16); u16(1); u16(n);
            u32(abuffer.sampleRate); u32(abuffer.sampleRate * 2 * n); u16(n * 2); u16(16); u32(0x61746164); u32(len - p - 4);
            for(i = 0; i < n; i++) chans.push(abuffer.getChannelData(i));
            while(p < len) {
                for(i = 0; i < n; i++) { s = Math.max(-1, Math.min(1, chans[i][o])); s = (0.5 + s < 0 ? s * 32768 : s * 32767)|0; view.setInt16(p, s, true); p += 2; }
                o++;
            }
            return new Blob([buf], {type: "audio/wav"});
        }
    </script>
