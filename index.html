<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶石鑑定室有聲書製作平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .rounded-card { border-radius: 2rem; }
        .voice-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 列印樣式設定 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            @page { margin: 1.5cm; } /* 減少邊距以嘗試隱藏瀏覽器預設頁首尾 */
            .print-area { display: block !important; }
            .print-header { display: flex; justify-content: flex-end; font-size: 10pt; color: #666; margin-bottom: 5px; }
            .print-title { text-align: center; font-size: 18pt; font-weight: bold; margin-bottom: 15px; }
            .print-info { display: flex; justify-content: space-between; border-bottom: 1.5px solid black; padding-bottom: 5px; margin-bottom: 20px; font-size: 12pt; }
            .print-question { page-break-inside: avoid; margin-bottom: 20px; font-size: 13pt; line-height: 1.8; }
            .print-bracket { font-family: monospace; letter-spacing: 2px; }
            .print-options { padding-left: 2.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        }

        .print-area { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto no-print">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-700 mb-2 flex items-center justify-center gap-3">
                <span>💎</span> 寶石鑑定室有聲書製作平台 <span>💎</span>
            </h1>
            <p class="text-slate-500 text-lg">分段錄製故事，隨時編輯題庫，輕鬆製作有聲書！</p>
        </header>

        <!-- 上半部：錄音與編輯 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-7">
                <div class="bg-white p-6 rounded-card shadow-xl border-4 border-indigo-100 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-slate-700 flex items-center gap-2"><span>✍️</span> 故事內容編輯</h2>
                        <div class="flex space-x-2">
                            <button id="micBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full transition-all shadow-lg flex items-center font-bold">
                                <span id="micIcon" class="mr-2 text-xl">🎤</span><span id="micText">繼續錄下一段</span>
                            </button>
                            <button id="clearAllBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-4 py-2 rounded-full text-sm font-medium">重置全部</button>
                        </div>
                    </div>
                    <textarea id="storyEditor" class="flex-1 w-full min-h-[400px] p-6 border-2 border-dashed border-indigo-50 rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none text-xl leading-relaxed custom-scroll bg-indigo-50/10" placeholder="點擊錄音鈕開始錄製故事..."></textarea>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white p-6 rounded-card shadow-xl border-4 border-emerald-100 flex flex-col h-full min-h-[500px]">
                    <div class="flex justify-between items-center mb-4 border-b pb-4">
                        <h2 class="text-xl font-bold text-slate-700">🎧 有聲書分段</h2>
                        <div class="flex gap-2">
                            <button id="btnA" class="hidden bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-sm">A 🔊 產生有聲書</button>
                            <button id="btnB" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-sm">B 💾 彙整下載</button>
                        </div>
                    </div>
                    <div id="segmentsList" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scroll mt-4">
                        <div class="flex flex-col items-center justify-center h-full text-slate-300 italic py-10">
                            <span class="text-5xl mb-4">📀</span><p>尚未錄製任何段落</p>
                        </div>
                    </div>
                    <div id="mergeLoading" class="hidden mt-4 text-center text-sm text-indigo-500 font-bold animate-pulse">💎 正在處理音檔中...</div>
                </div>
            </div>
        </div>

        <!-- 下半部：功能區塊 -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <div class="bg-white p-4 rounded-card shadow-lg border-2 border-slate-100 flex flex-col items-center justify-center text-center gap-2 min-h-[160px]">
                <span class="text-3xl">📖</span><label class="text-[10px] text-slate-400 uppercase tracking-widest">1. 繪本名稱</label>
                <input type="text" id="bookTitleInput" class="w-full text-center font-bold text-slate-700 border-b-2 border-indigo-100 focus:border-indigo-400 outline-none px-1" value="圈圈村的故事">
                <div id="bookAudioContainer" class="hidden w-full mt-2"><audio id="bookAudioPlayer" controls class="w-full h-8"></audio></div>
            </div>

            <div class="bg-white p-4 rounded-card shadow-lg border-2 border-slate-100 flex flex-col items-center justify-center text-center gap-2 min-h-[160px]">
                <span class="text-3xl">📝</span><label class="text-[10px] text-slate-400 uppercase tracking-widest">2. 內容檢視</label>
                <div id="fullTextDisplay" class="text-[10px] text-slate-400 h-16 overflow-y-auto px-2 leading-tight custom-scroll">尚未錄製文字...</div>
            </div>

            <button id="editBankBtn" class="bg-white hover:bg-sky-50 p-4 rounded-card shadow-lg border-2 border-slate-100 flex flex-col items-center justify-center text-center gap-2 transition-all group min-h-[160px]">
                <span class="text-3xl group-hover:rotate-12 transition-all">⚙️</span>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest">3. 題庫與語句調整</label>
                <span class="text-sky-600 font-bold text-sm">編輯完整題庫</span>
            </button>

            <button id="startQuizBtn" class="bg-orange-500 hover:bg-orange-600 p-4 rounded-card shadow-xl flex flex-col items-center justify-center text-center gap-2 text-white border-4 border-orange-400 min-h-[160px]">
                <span class="text-3xl">📝</span><label class="text-[10px] opacity-80 uppercase text-white">4. 立即線上測驗</label>
                <span class="font-bold text-sm">開始挑戰答題</span>
            </button>

            <button onclick="preparePrint()" class="bg-emerald-50 hover:bg-emerald-100 p-4 rounded-card shadow-lg border-2 border-emerald-100 flex flex-col items-center justify-center text-center gap-2 text-emerald-700 min-h-[160px]">
                <span class="text-3xl">🖨️</span><label class="text-[10px] opacity-60 uppercase">5. 列印 A4 測驗卷</label>
                <span class="font-bold text-sm">輸出紙本測驗</span>
            </button>
        </div>
    </div>

    <!-- 測驗 Modal -->
    <div id="quizModal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 no-print backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-card shadow-2xl p-8 max-h-[90vh] overflow-y-auto border-t-8 border-orange-500">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-orange-600">💎 寶石挑戰賽 💎</h3>
                <button onclick="closeQuiz()" class="text-slate-400 hover:text-slate-600 text-3xl font-bold">&times;</button>
            </div>
            <div id="quizBody" class="space-y-6"></div>
            <div id="quizFooter" class="mt-8 flex justify-between items-center gap-4 border-t pt-4">
                <p id="quizProgress" class="text-slate-500 font-bold">第 1 / 5 題</p>
                <div id="feedbackMsg" class="font-bold text-lg"></div>
                <button id="nextBtn" class="hidden bg-indigo-600 text-white px-8 py-2 rounded-full font-bold shadow-md">下一題 ➡️</button>
                <button id="restartBtn" class="hidden bg-emerald-600 text-white px-8 py-2 rounded-full font-bold shadow-md">重新抽題</button>
            </div>
        </div>
    </div>

    <!-- 題庫編輯 Modal -->
    <div id="bankModal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 no-print backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl rounded-card shadow-2xl p-8 max-h-[90vh] overflow-y-auto border-t-8 border-sky-500">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-sky-600">⚙️ 編輯題庫資料庫</h3>
                <button onclick="closeBank()" class="text-slate-400 hover:text-slate-600 text-3xl font-bold">&times;</button>
            </div>
            <div id="bankEditorList" class="space-y-8"></div>
            <div class="mt-8 pt-4 border-t flex justify-end gap-2">
                <button onclick="addQuestion()" class="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-full font-bold">➕ 新增題目</button>
                <button onclick="saveBank()" class="bg-sky-600 text-white px-10 py-2 rounded-full font-bold shadow-lg">💾 儲存變更</button>
            </div>
        </div>
    </div>

    <!-- 紙本列印區域 -->
    <div id="paperOutput" class="print-area">
        <div class="print-header">寶石鑑定室有聲書製作平台</div>
        <div class="print-title" id="printQuizTitle">《圈圈村的故事》閱讀理解測驗卷</div>
        <div class="print-info">
            <span>班級：__________</span><span>座號：__________</span><span>姓名：__________</span><span>得分：__________</span>
        </div>
        <div id="printQuestionContainer"></div>
    </div>

    <script>
        // --- 核心資料庫 (可編輯) ---
        let questionBank = [
            { q: "從天空中往下看，圈圈村的形狀看起來像什麼呢？", options: ["一個大三角形", "一個甜甜圈", "一塊大餅乾", "一顆愛心"], ans: 1 },
            { q: "圈圈村的人，長相通常具備什麼特徵？", options: ["全身上下都是尖尖的", "鼻子、眼睛、臉都是圓圓的", "每個人都戴著尖尖的帽子", "他們長得非常高大"], ans: 1 },
            { q: "下列哪一個不是圈圈村裡「圓圓的東西」？", options: ["鵝卵石", "路燈", "長椅", "尖尖的鐵剪刀"], ans: 3 },
            { q: "尖尖人阿三出現在西瓜田時，手裡拿著什麼東西？", options: ["圓圓的氣球", "尖尖的鐵剪刀", "一個大籃子", "圓圓的大剪刀"], ans: 1 },
            { q: "尖尖人阿三在逃跑的過程中，不小心弄破了什麼？", options: ["西瓜伯的西瓜", "村長的垃圾桶", "小朋友的氣球", "牆上的大橘貓"], ans: 2 },
            { q: "最後是誰出面解釋，才解開了大家的誤會？", options: ["村長", "小小朋友", "大橘貓", "西瓜伯"], ans: 3 }
        ];

        let segments = [];
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let recognition;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        const storyEditor = document.getElementById('storyEditor');
        const fullTextDisplay = document.getElementById('fullTextDisplay');
        const bookAudioPlayer = document.getElementById('bookAudioPlayer');

        // 文字同步
        storyEditor.addEventListener('input', () => { fullTextDisplay.innerText = storyEditor.value || "尚未錄製文字..."; });

        // 錄音設定
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';
            recognition.onresult = (e) => {
                let final = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                }
                if (final) {
                    const separator = (storyEditor.value.trim() && !/[。！？]$/.test(storyEditor.value.trim())) ? '，' : ' ';
                    storyEditor.value = (storyEditor.value.trim() ? storyEditor.value.trim() + separator : "") + final;
                    fullTextDisplay.innerText = storyEditor.value;
                }
            };
        }

        document.getElementById('micBtn').onclick = async () => {
            if (isRecording) {
                if(mediaRecorder) mediaRecorder.stop();
                if(recognition) recognition.stop();
                isRecording = false;
                document.getElementById('micBtn').classList.remove('voice-active');
                document.getElementById('micText').innerText = "繼續錄下一段";
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        segments.push({ blob, url: URL.createObjectURL(blob) });
                        renderSegments();
                    };
                    mediaRecorder.start();
                    if (recognition) recognition.start();
                    isRecording = true;
                    document.getElementById('micBtn').classList.add('voice-active');
                    document.getElementById('micText').innerText = "錄音中...點擊停止";
                } catch (err) { alert("無法開啟麥克風！"); }
            }
        };

        function renderSegments() {
            const btnA = document.getElementById('btnA');
            const btnB = document.getElementById('btnB');
            if (segments.length > 0) { btnA.classList.remove('hidden'); btnB.classList.remove('hidden'); }
            document.getElementById('segmentsList').innerHTML = segments.map((seg, i) => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <span class="bg-indigo-600 text-white w-7 h-7 rounded-full text-[10px] flex items-center justify-center font-bold">P${i + 1} ✅</span>
                        <audio src="${seg.url}" controls class="h-8 w-40 md:w-48"></audio>
                    </div>
                    <button onclick="deleteSeg(${i})" class="text-red-400 hover:bg-red-50 p-2 rounded-full">🗑️</button>
                </div>
            `).join('');
        }

        window.deleteSeg = (idx) => { if(confirm("刪除這段錄音嗎？")) { segments.splice(idx, 1); renderSegments(); } };

        document.getElementById('btnA').onclick = async () => {
            document.getElementById('mergeLoading').classList.remove('hidden');
            const blob = await mergeAudios();
            bookAudioPlayer.src = URL.createObjectURL(blob);
            document.getElementById('bookAudioContainer').classList.remove('hidden');
            bookAudioPlayer.play();
            document.getElementById('mergeLoading').classList.add('hidden');
        };

        document.getElementById('btnB').onclick = async () => {
            document.getElementById('mergeLoading').classList.remove('hidden');
            const blob = await mergeAudios();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${document.getElementById('bookTitleInput').value}_完整有聲書.wav`;
            a.click();
            document.getElementById('mergeLoading').classList.add('hidden');
        };

        async function mergeAudios() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const buffers = await Promise.all(segments.map(async s => ctx.decodeAudioData(await s.blob.arrayBuffer())));
            const totalLen = buffers.reduce((a, b) => a + b.length, 0);
            const final = ctx.createBuffer(buffers[0].numberOfChannels, totalLen, buffers[0].sampleRate);
            let offset = 0;
            for (const b of buffers) {
                for (let c = 0; c < b.numberOfChannels; c++) final.getChannelData(c).set(b.getChannelData(c), offset);
                offset += b.length;
            }
            return bufferToWav(final);
        }

        // --- 題庫編輯邏輯 ---
        document.getElementById('editBankBtn').onclick = () => {
            const list = document.getElementById('bankEditorList');
            list.innerHTML = questionBank.map((q, i) => `
                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200 relative">
                    <button onclick="removeQuestion(${i})" class="absolute top-4 right-4 text-red-500 font-bold">❌ 刪除</button>
                    <div class="mb-4">
                        <label class="block text-xs text-slate-400 mb-1 font-bold">第 ${i+1} 題 題目描述：</label>
                        <input type="text" class="w-full p-3 border rounded-xl" id="q_txt_${i}" value="${q.q}">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${q.options.map((opt, oi) => `
                            <div>
                                <label class="block text-[10px] text-slate-400 mb-1">選項 ${String.fromCharCode(65+oi)}：</label>
                                <div class="flex items-center gap-2">
                                    <input type="text" class="flex-1 p-2 border rounded-lg text-sm" id="q_${i}_opt_${oi}" value="${opt}">
                                    <input type="radio" name="correct_${i}" ${q.ans === oi ? 'checked' : ''} value="${oi}" title="正確答案">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('bankModal').classList.remove('hidden');
        };

        window.addQuestion = () => {
            questionBank.push({ q: "新題目敘述", options: ["選項A", "選項B", "選項C", "選項D"], ans: 0 });
            document.getElementById('editBankBtn').click();
        };

        window.removeQuestion = (idx) => {
            if(confirm("確定刪除此題嗎？")) {
                questionBank.splice(idx, 1);
                document.getElementById('editBankBtn').click();
            }
        };

        window.saveBank = () => {
            const newList = [];
            questionBank.forEach((_, i) => {
                const qText = document.getElementById(`q_txt_${i}`).value;
                const opts = [
                    document.getElementById(`q_${i}_opt_0`).value,
                    document.getElementById(`q_${i}_opt_1`).value,
                    document.getElementById(`q_${i}_opt_2`).value,
                    document.getElementById(`q_${i}_opt_3`).value,
                ];
                const correct = parseInt(document.querySelector(`input[name="correct_${i}"]:checked`).value);
                newList.push({ q: qText, options: opts, ans: correct });
            });
            questionBank = newList;
            closeBank();
            alert("題庫儲存成功！");
        };

        window.closeBank = () => document.getElementById('bankModal').classList.add('hidden');

        // --- 線上測驗邏輯 (隨機化選項) ---
        let currentQuiz = [];
        let currentIdx = 0;
        let score = 0;

        document.getElementById('startQuizBtn').onclick = () => {
            if(questionBank.length < 1) return alert("題庫中沒有題目喔！");
            
            // 隨機選 5 題 (若不夠 5 題則全選)
            let shuffledBank = [...questionBank].sort(() => Math.random() - 0.5);
            let pool = shuffledBank.slice(0, Math.min(5, shuffledBank.length));
            
            // 選項亂序處理
            currentQuiz = pool.map(item => {
                let originalOptions = item.options.map((text, i) => ({ text, isCorrect: i === item.ans }));
                let shuffledOptions = originalOptions.sort(() => Math.random() - 0.5);
                return {
                    q: item.q,
                    options: shuffledOptions.map(o => o.text),
                    ans: shuffledOptions.findIndex(o => o.isCorrect)
                };
            });

            currentIdx = 0; score = 0;
            document.getElementById('quizModal').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            const data = currentQuiz[currentIdx];
            document.getElementById('quizProgress').innerText = `第 ${currentIdx + 1} / ${currentQuiz.length} 題`;
            document.getElementById('feedbackMsg').innerText = "";
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('restartBtn').classList.add('hidden');
            document.getElementById('quizBody').innerHTML = `
                <div class="text-xl font-bold text-slate-800 mb-6 bg-slate-50 p-4 rounded-xl border-l-4 border-indigo-500">${data.q}</div>
                <div class="grid grid-cols-1 gap-4">
                    ${data.options.map((opt, i) => `<button onclick="checkAns(${i})" class="text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-all font-medium text-lg flex items-center"><span class="bg-slate-200 text-slate-600 w-8 h-8 rounded-full flex items-center justify-center mr-3 font-bold">${String.fromCharCode(65+i)}</span> ${opt}</button>`).join('')}
                </div>`;
        }

        window.checkAns = (idx) => {
            const data = currentQuiz[currentIdx];
            const btns = document.getElementById('quizBody').querySelectorAll('button');
            btns.forEach(b => b.disabled = true);
            if (idx === data.ans) {
                btns[idx].classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                document.getElementById('feedbackMsg').innerHTML = "<span class='text-green-600 font-bold'>✨ 答題正確！</span>";
                score++;
            } else {
                btns[idx].classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                btns[data.ans].classList.add('bg-green-50', 'border-green-300');
                document.getElementById('feedbackMsg').innerHTML = "<span class='text-red-500 font-bold'>❌ 答題錯誤！</span>";
            }
            if (currentIdx < currentQuiz.length - 1) document.getElementById('nextBtn').classList.remove('hidden'); else showResult();
        };

        document.getElementById('nextBtn').onclick = () => { currentIdx++; showQuestion(); };
        function showResult() {
            document.getElementById('quizBody').innerHTML = `<div class="text-center py-8"><h4 class="text-4xl font-bold mb-4 text-slate-800">挑戰賽結束</h4><div class="text-6xl mb-4">🏆</div><p class="text-2xl text-indigo-600 font-bold">得分：${Math.round(score * (100/currentQuiz.length))} 分</p></div>`;
            document.getElementById('restartBtn').innerText = "重新抽題";
            document.getElementById('restartBtn').classList.remove('hidden');
            document.getElementById('restartBtn').onclick = () => { document.getElementById('startQuizBtn').click(); };
        }

        window.closeQuiz = () => document.getElementById('quizModal').classList.add('hidden');

        // --- 列印功能 ---
        function preparePrint() {
            const container = document.getElementById('printQuestionContainer');
            container.innerHTML = "";
            document.getElementById('printQuizTitle').innerText = `《${document.getElementById('bookTitleInput').value}》閱讀理解測驗卷`;
            
            // 列印所有題庫內容
            questionBank.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = "print-question";
                let html = `<div><span class="print-bracket">(       )</span> ${index + 1}. ${item.q}</div><div class="print-options">`;
                item.options.forEach((opt, i) => { html += `<div>(${String.fromCharCode(65 + i)}) ${opt}</div>`; });
                html += `</div>`;
                qDiv.innerHTML = html;
                container.appendChild(qDiv);
            });
            window.print();
        }

        function bufferToWav(abuffer) {
            let n = abuffer.numberOfChannels, len = abuffer.length * n * 2 + 44,
                buf = new ArrayBuffer(len), view = new DataView(buf),
                chans = [], i, s, o = 0, p = 0;
            const u16 = (d) => { view.setUint16(p, d, true); p += 2; };
            const u32 = (d) => { view.setUint32(p, d, true); p += 4; };
            u32(0x46464952); u32(len - 8); u32(0x45564157); u32(0x20746d66); u32(16); u16(1); u16(n);
            u32(abuffer.sampleRate); u32(abuffer.sampleRate * 2 * n); u16(n * 2); u16(16); u32(0x61746164); u32(len - p - 4);
            for(i = 0; i < n; i++) chans.push(abuffer.getChannelData(i));
            while(p < len) {
                for(i = 0; i < n; i++) {
                    s = Math.max(-1, Math.min(1, chans[i][o]));
                    s = (0.5 + s < 0 ? s * 32768 : s * 32767)|0;
                    view.setInt16(p, s, true); p += 2;
                }
                o++;
            }
            return new Blob([buf], {type: "audio/wav"});
        }
    </script>
