<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶石鑑定室有聲書製作平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }

        .rounded-card {
            border-radius: 2rem;
        }

        .voice-active {
            animation: pulse 1.5s infinite;
            background-color: #ef4444 !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 針對列印的樣式設定 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            .print-area { display: block !important; padding: 1cm; }
            .print-question { page-break-inside: avoid; margin-bottom: 1.5rem; font-size: 14pt; line-height: 1.8; }
            .print-options { padding-left: 2.5rem; }
        }

        .print-area { display: none; }
        
        /* 自定義捲軸 */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 頁面堆疊效果圖示 */
        .page-stack {
            position: relative;
            width: 40px;
            height: 50px;
        }
        .page-item {
            position: absolute;
            width: 30px;
            height: 40px;
            background: white;
            border: 2px solid #38bdf8;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #38bdf8;
        }
        .page-1 { transform: rotate(-10deg); left: 0; z-index: 10; }
        .page-2 { transform: rotate(0deg); left: 10px; top: 5px; z-index: 5; opacity: 0.8; }
        .page-3 { transform: rotate(10deg); left: 20px; top: 10px; z-index: 1; opacity: 0.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 網頁 UI 區塊 -->
    <div class="max-w-6xl mx-auto no-print">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-700 mb-2 flex items-center justify-center gap-3">
                <span>💎</span> 寶石鑑定室有聲書製作平台 <span>💎</span>
            </h1>
            <p class="text-slate-500 text-lg">分段錄製故事，打造屬於您的線上有聲書！</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-6">
            
            <!-- Left Side: Story Editor -->
            <div class="lg:col-span-7">
                <div class="bg-white p-6 rounded-card shadow-xl border-4 border-indigo-100 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-slate-700 flex items-center">
                            <span class="mr-2">✍️</span> 故事內容編輯
                        </h2>
                        <div class="flex space-x-2">
                            <button id="micBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full transition-all shadow-lg flex items-center font-bold">
                                <span id="micIcon" class="mr-2 text-xl">🎤</span>
                                <span id="micText">開始錄音</span>
                            </button>
                            <button id="clearAllBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-4 py-2 rounded-full text-sm font-medium">重置全部</button>
                        </div>
                    </div>
                    
                    <textarea id="storyEditor" class="flex-1 w-full min-h-[400px] p-6 border-2 border-dashed border-indigo-50 rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none text-xl leading-relaxed custom-scroll bg-indigo-50/10" placeholder="點擊錄音鈕開始說故事內容..."></textarea>
                </div>
            </div>

            <!-- Right Side: Audio Management -->
            <div class="lg:col-span-5">
                <div class="bg-white p-6 rounded-card shadow-xl border-4 border-emerald-100 flex flex-col h-full min-h-[500px]">
                    <div class="flex justify-between items-center mb-4 border-b pb-4">
                        <h2 class="text-xl font-bold text-slate-700 flex items-center">
                            <span class="mr-2">🎧</span> 有聲書分段錄製
                        </h2>
                        <div class="flex gap-2">
                            <button id="btnA" class="hidden bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-sm flex items-center gap-1">
                                <span>A</span> 🔊 線上試聽
                            </button>
                            <button id="btnB" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-sm flex items-center gap-1">
                                <span>B</span> 💾 彙整下載
                            </button>
                        </div>
                    </div>

                    <!-- 全書播放器 (Button A 生成) -->
                    <div id="fullPlayerContainer" class="hidden mb-4 p-3 bg-indigo-50 rounded-xl border border-indigo-200">
                        <p class="text-xs text-indigo-600 font-bold mb-2 text-center">✨ 整本線上有聲書播放中 ✨</p>
                        <audio id="fullAudioPlayer" controls class="w-full h-10"></audio>
                    </div>
                    
                    <div id="segmentsList" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scroll">
                        <div class="flex flex-col items-center justify-center h-full text-slate-300 italic py-10">
                            <span class="text-5xl mb-4">📀</span>
                            <p>尚未錄製任何段落</p>
                        </div>
                    </div>

                    <div id="mergeLoading" class="hidden mt-4 text-center text-sm text-indigo-500 font-bold animate-pulse">
                        💎 正在鑑定並合併音檔中...
                    </div>
                </div>
            </div>
        </div>

        <!-- 下半部 6 大功能區 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            
            <!-- 1. 繪本名稱 (可修正) -->
            <div class="bg-white p-6 rounded-card shadow-lg border-2 border-slate-100 flex flex-col items-center justify-center gap-3">
                <div class="text-3xl">📖</div>
                <div class="w-full">
                    <label class="text-xs text-slate-400 block text-center mb-1">1. 繪本名稱 (點擊修正)</label>
                    <input type="text" id="bookTitleInput" class="w-full text-center font-bold text-slate-700 border-b-2 border-indigo-200 focus:border-indigo-500 outline-none px-2 py-1" value="圈圈村的故事">
                </div>
            </div>

            <!-- 2. 鑽石圖示裝飾 -->
            <div class="bg-indigo-50 p-6 rounded-card shadow-lg border-2 border-indigo-100 flex flex-col items-center justify-center">
                <div class="text-5xl mb-2 animate-bounce">💎</div>
                <div class="text-indigo-600 font-bold">2. 寶石鑑定室推薦</div>
            </div>

            <!-- 3. 完整繪本文字 -->
            <div class="bg-white p-6 rounded-card shadow-lg border-2 border-slate-100 flex flex-col items-center justify-center gap-2 overflow-hidden">
                <div class="page-stack">
                    <div class="page-item page-3"></div>
                    <div class="page-item page-2"></div>
                    <div class="page-item page-1"></div>
                </div>
                <div class="w-full text-center">
                    <label class="text-xs text-slate-400 block mb-1">3. 整本繪本內文</label>
                    <div id="fullTextDisplay" class="text-xs text-slate-500 h-16 overflow-y-auto custom-scroll text-left p-1 border rounded bg-slate-50 italic">尚未輸入內容...</div>
                </div>
            </div>

            <!-- 4. 查看題庫 -->
            <button id="viewBankBtn" class="bg-sky-50 hover:bg-sky-100 text-sky-700 font-bold p-6 rounded-card border-2 border-sky-200 transition-all flex flex-col items-center justify-center gap-2 shadow-md">
                <span class="text-4xl">🔍</span>
                <span class="text-lg">4. 查看完整題庫</span>
            </button>

            <!-- 5. 立即線上測驗 -->
            <button id="startQuizBtn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold p-6 rounded-card shadow-lg transition-all flex flex-col items-center justify-center gap-2 border-4 border-orange-400">
                <span class="text-4xl">📝</span>
                <span class="text-lg">5. 立即線上測驗</span>
            </button>

            <!-- 6. 列印 A4 測驗卷 -->
            <button onclick="preparePrint()" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold p-6 rounded-card border-2 border-emerald-200 transition-all flex flex-col items-center justify-center gap-2 shadow-md">
                <span class="text-4xl">🖨️</span>
                <span class="text-lg">6. 列印 A4 測驗卷</span>
            </button>
        </div>
    </div>

    <!-- 測驗 Modal -->
    <div id="quizModal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 no-print backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-card shadow-2xl p-8 max-h-[90vh] overflow-y-auto border-t-8 border-orange-500">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-orange-600">💎 寶石挑戰賽 💎</h3>
                <button onclick="closeQuiz()" class="text-slate-400 hover:text-slate-600 text-3xl font-bold transition-colors">&times;</button>
            </div>
            <div id="quizBody" class="space-y-6"></div>
            <div id="quizFooter" class="mt-8 flex justify-between items-center gap-4 border-t pt-4">
                <p id="quizProgress" class="text-slate-500 font-bold">第 1 / 5 題</p>
                <div id="feedbackMsg" class="font-bold text-lg"></div>
                <button id="nextBtn" class="hidden bg-indigo-600 text-white px-8 py-2 rounded-full font-bold shadow-md hover:bg-indigo-700">下一題 ➡️</button>
                <button id="restartBtn" class="hidden bg-emerald-600 text-white px-8 py-2 rounded-full font-bold shadow-md hover:bg-emerald-700">重新抽題</button>
            </div>
        </div>
    </div>

    <!-- 紙本輸出區塊 -->
    <div id="paperOutput" class="print-area">
        <h1 class="text-3xl font-bold text-center mb-8" id="printBookTitle">《圈圈村》閱讀理解測驗卷</h1>
        <div class="flex justify-between mb-8 border-b-2 border-black pb-2">
            <span>班級：__________</span> <span>座號：__________</span> <span>姓名：__________</span> <span>得分：__________</span>
        </div>
        <div id="printQuestionContainer"></div>
    </div>

    <script>
        // --- 題庫資料 ---
        const questionBank = [
            { q: "從天空中往下看，圈圈村的形狀看起來像什麼呢？", options: ["一個大三角形", "一個甜甜圈", "一塊大餅乾", "一顆愛心"], ans: 1 },
            { q: "圈圈村的人，長相通常具備什麼特徵？", options: ["全身上下都是尖尖的", "鼻子、眼睛、臉都是圓圓的", "每個人都戴著尖尖的帽子", "他們長得非常高大"], ans: 1 },
            { q: "下列哪一個不是圈圈村裡「圓圓的東西」？", options: ["鵝卵石", "路燈", "長椅", "尖尖的鐵剪刀"], ans: 3 },
            { q: "尖尖人阿三出現在西瓜田時，手裡拿著什麼東西？", options: ["圓圓的氣球", "尖尖的鐵剪刀", "一個大籃子", "圓圓的大剪刀"], ans: 1 },
            { q: "尖尖人阿三在逃跑的過程中，不小心弄破了什麼？", options: ["西瓜伯的西瓜", "村長的垃圾桶", "小朋友的氣球", "牆上的大橘貓"], ans: 2 },
            { q: "村民們為什麼要一直追趕尖尖人阿三？", options: ["因為大家誤以為他是小偷", "因為阿三邀請大家跑步", "因為大家喜歡追著尖尖的東西跑", "以上皆非"], ans: 0 },
            { q: "最後是誰出面解釋，才解開了大家的誤會？", options: ["村長", "小小朋友", "大橘貓", "西瓜伯"], ans: 3 },
            { q: "這個故事想要告訴我們什麼道理呢？", options: ["多運動好健康", "不可以只看外表就誤會別人", "尖尖的東西很有用", "西瓜要選大顆的"], ans: 1 }
        ];

        // --- 狀態管理 ---
        let segments = [];
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let recognition;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        const storyEditor = document.getElementById('storyEditor');
        const micBtn = document.getElementById('micBtn');
        const micText = document.getElementById('micText');
        const segmentsList = document.getElementById('segmentsList');
        const btnA = document.getElementById('btnA');
        const btnB = document.getElementById('btnB');
        const fullTextDisplay = document.getElementById('fullTextDisplay');

        // --- 同步文字顯示 ---
        storyEditor.addEventListener('input', () => {
            fullTextDisplay.innerText = storyEditor.value || "尚未輸入內容...";
        });

        // --- 錄音功能 ---
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';
            recognition.onresult = (e) => {
                let final = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                }
                if (final) {
                    const lastChar = storyEditor.value.trim().slice(-1);
                    const separator = (lastChar && !['。','！','？'].includes(lastChar)) ? '，' : ' ';
                    storyEditor.value = (storyEditor.value.trim() ? storyEditor.value.trim() + separator : "") + final;
                    fullTextDisplay.innerText = storyEditor.value;
                }
            };
        }

        micBtn.onclick = async () => {
            if (isRecording) {
                stopRec();
            } else {
                startRec();
            }
        };

        async function startRec() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const url = URL.createObjectURL(blob);
                    segments.push({ blob, url });
                    renderSegments();
                };
                mediaRecorder.start();
                if (recognition) recognition.start();
                isRecording = true;
                micBtn.classList.add('voice-active');
                micText.innerText = "錄音中...點我停止";
            } catch (err) { alert("無法開啟麥克風！"); }
        }

        function stopRec() {
            if (mediaRecorder) mediaRecorder.stop();
            if (recognition) recognition.stop();
            isRecording = false;
            micBtn.classList.remove('voice-active');
            micText.innerText = "繼續錄下一頁";
        }

        function renderSegments() {
            if (segments.length > 0) {
                btnA.classList.remove('hidden');
                btnB.classList.remove('hidden');
            } else {
                btnA.classList.add('hidden');
                btnB.classList.add('hidden');
            }

            segmentsList.innerHTML = segments.map((seg, i) => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center justify-between gap-3 shadow-sm">
                    <div class="flex items-center gap-3">
                        <span class="bg-indigo-600 text-white w-7 h-7 rounded-full text-xs flex items-center justify-center font-bold">P${i + 1}</span>
                        <audio src="${seg.url}" controls class="h-8 w-40"></audio>
                    </div>
                    <button onclick="deleteSegment(${i})" class="text-red-400 hover:bg-red-50 p-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            `).join('');
            if (segments.length === 0) {
                segmentsList.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-300 italic py-10"><span class="text-5xl mb-4">📀</span><p>尚未錄製任何段落</p></div>`;
            }
        }

        window.deleteSegment = (idx) => {
            if(confirm("刪除這段錄音嗎？")) {
                segments.splice(idx, 1);
                renderSegments();
            }
        }

        document.getElementById('clearAllBtn').onclick = () => {
            if(confirm("確定要全部重置嗎？")) {
                segments = [];
                storyEditor.value = "";
                fullTextDisplay.innerText = "尚未輸入內容...";
                renderSegments();
                document.getElementById('fullPlayerContainer').classList.add('hidden');
            }
        };

        // --- 音檔合併核心邏輯 ---
        async function getMergedAudioBlob() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const buffers = await Promise.all(segments.map(async (seg) => {
                const arrayBuffer = await seg.blob.arrayBuffer();
                return await audioCtx.decodeAudioData(arrayBuffer);
            }));

            const totalLength = buffers.reduce((acc, buf) => acc + buf.length, 0);
            const finalBuffer = audioCtx.createBuffer(buffers[0].numberOfChannels, totalLength, buffers[0].sampleRate);

            let offset = 0;
            for (const buf of buffers) {
                for (let channel = 0; channel < buf.numberOfChannels; channel++) {
                    finalBuffer.getChannelData(channel).set(buf.getChannelData(channel), offset);
                }
                offset += buf.length;
            }
            return bufferToWav(finalBuffer);
        }

        // 按鈕 A: 線上播放
        btnA.onclick = async () => {
            const loading = document.getElementById('mergeLoading');
            loading.classList.remove('hidden');
            try {
                const wavBlob = await getMergedAudioBlob();
                const url = URL.createObjectURL(wavBlob);
                const player = document.getElementById('fullAudioPlayer');
                player.src = url;
                document.getElementById('fullPlayerContainer').classList.remove('hidden');
                player.play();
            } catch (err) { alert("合併播放失敗！"); }
            loading.classList.add('hidden');
        };

        // 按鈕 B: 下載
        btnB.onclick = async () => {
            const loading = document.getElementById('mergeLoading');
            loading.classList.remove('hidden');
            try {
                const wavBlob = await getMergedAudioBlob();
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${document.getElementById('bookTitleInput').value}_全書.wav`;
                a.click();
            } catch (err) { alert("下載失敗！"); }
            loading.classList.add('hidden');
        };

        // --- WAV Helper ---
        function bufferToWav(abuffer) {
            let numOfChan = abuffer.numberOfChannels, length = abuffer.length * numOfChan * 2 + 44,
                buffer = new ArrayBuffer(length), view = new DataView(buffer),
                channels = [], i, sample, offset = 0, pos = 0;
            const setUint16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            const setUint32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
            setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
            setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan);
            setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);
            for(i = 0; i < abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));
            while(pos < length) {
                for(i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0;
                    view.setInt16(pos, sample, true); pos += 2;
                }
                offset++;
            }
            return new Blob([buffer], {type: "audio/wav"});
        }

        // --- 測驗功能 ---
        let selectedQuestions = [];
        let currentIdx = 0;
        let score = 0;

        document.getElementById('startQuizBtn').onclick = () => {
            selectedQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 5);
            currentIdx = 0; score = 0;
            document.getElementById('quizModal').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            const data = selectedQuestions[currentIdx];
            document.getElementById('quizProgress').innerText = `第 ${currentIdx + 1} / 5 題`;
            document.getElementById('feedbackMsg').innerText = "";
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('restartBtn').classList.add('hidden');
            document.getElementById('quizBody').innerHTML = `
                <div class="text-xl font-bold text-slate-800 mb-6 bg-slate-50 p-4 rounded-xl border-l-4 border-indigo-500">${data.q}</div>
                <div class="grid grid-cols-1 gap-4">
                    ${data.options.map((opt, i) => `<button onclick="checkAns(${i})" class="text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-all font-medium text-lg flex items-center"><span class="bg-slate-200 text-slate-600 w-8 h-8 rounded-full flex items-center justify-center mr-3 font-bold">${String.fromCharCode(65+i)}</span> ${opt}</button>`).join('')}
                </div>`;
        }

        window.checkAns = (idx) => {
            const data = selectedQuestions[currentIdx];
            const btns = document.getElementById('quizBody').querySelectorAll('button');
            btns.forEach(b => b.disabled = true);
            if (idx === data.ans) {
                btns[idx].classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                document.getElementById('feedbackMsg').innerHTML = "<span class='text-green-600 font-bold'>✨ 鑑定正確！</span>";
                score++;
            } else {
                btns[idx].classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                btns[data.ans].classList.add('bg-green-50', 'border-green-300');
                document.getElementById('feedbackMsg').innerHTML = "<span class='text-red-500 font-bold'>❌ 有點小誤差喔！</span>";
            }
            if (currentIdx < 4) document.getElementById('nextBtn').classList.remove('hidden');
            else showResult();
        };

        document.getElementById('nextBtn').onclick = () => { currentIdx++; showQuestion(); };
        function showResult() {
            document.getElementById('quizBody').innerHTML = `<div class="text-center py-8"><h4 class="text-4xl font-bold mb-4">挑戰賽結束</h4><div class="text-6xl mb-4">${score === 5 ? '🏆' : '💎'}</div><p class="text-2xl text-indigo-600 font-bold">總分：${score * 20} 分</p></div>`;
            document.getElementById('restartBtn').classList.remove('hidden');
            document.getElementById('restartBtn').onclick = () => { document.getElementById('startQuizBtn').click(); };
        }

        window.closeQuiz = () => document.getElementById('quizModal').classList.add('hidden');
        document.getElementById('viewBankBtn').onclick = () => alert("【完整題庫預覽】\n\n" + questionBank.map((v, i) => (i+1) + ". " + v.q).join("\n"));

        function preparePrint() {
            const container = document.getElementById('printQuestionContainer');
            container.innerHTML = "";
            document.getElementById('printBookTitle').innerText = `《${document.getElementById('bookTitleInput').value}》閱讀理解測驗卷`;
            questionBank.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = "print-question";
                let html = `<div>(       ) ${index + 1}. ${item.q}</div><div class="print-options">`;
                item.options.forEach((opt, i) => { html += `<div>(${String.fromCharCode(65 + i)}) ${opt}</div>`; });
                html += `</div>`;
                qDiv.innerHTML = html;
                container.appendChild(qDiv);
            });
            window.print();
        }
    </script>
</body>
</html>
