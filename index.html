<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圈圈村互動學習小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f9ff;
        }

        .rounded-card {
            border-radius: 2rem;
        }

        .voice-active {
            animation: pulse 1.5s infinite;
            background-color: #ef4444 !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 針對列印的樣式設定 */
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: white !important;
                padding: 0 !important;
            }
            .print-area {
                display: block !important;
                padding: 1cm;
            }
            .print-question {
                page-break-inside: avoid; /* 確保題目與選項不跨頁 */
                margin-bottom: 1.5rem;
                font-size: 14pt;
                line-height: 1.8;
            }
            .print-options {
                padding-left: 2.5rem;
            }
        }

        .print-area {
            display: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 網頁 UI 區塊 (列印時隱藏) -->
    <div class="max-w-4xl mx-auto no-print">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">🔴 圈圈村互動學習平台 ⚪</h1>
            <p class="text-gray-600 text-lg">說出你的故事，製作有聲書，還可以列印測驗卷喔！</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Left Side: Story Editor -->
            <div class="md:col-span-2 space-y-4">
                <div class="bg-white p-6 rounded-card shadow-lg border-4 border-blue-200">
                    <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
                        <h2 class="text-xl font-bold text-gray-700">✍️ 故事創作區</h2>
                        <div class="flex space-x-2">
                            <button id="micBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-full transition-all shadow-md flex items-center">
                                <span id="micIcon" class="mr-2">🎤</span>
                                <span id="micText">開始錄音</span>
                            </button>
                            <button id="clearBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm font-medium">清除內容</button>
                        </div>
                    </div>
                    
                    <textarea id="storyEditor" class="w-full h-80 p-4 border-2 border-dashed border-blue-100 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none text-lg leading-relaxed" placeholder="點擊錄音鈕開始說故事..."></textarea>
                    
                    <div id="audioControls" class="hidden mt-4 p-4 bg-blue-50 rounded-xl flex flex-wrap items-center justify-between gap-4">
                        <audio id="audioPlayback" controls class="h-10"></audio>
                        <a id="downloadBtn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full text-sm font-bold shadow-sm cursor-pointer">💾 下載音檔</a>
                    </div>
                </div>
            </div>

            <!-- Right Side: Control Panel -->
            <div class="space-y-4">
                <div class="bg-white p-6 rounded-card shadow-lg border-4 border-orange-200 h-full">
                    <h2 class="text-xl font-bold text-gray-700 mb-4">📚 學習與測驗</h2>
                    
                    <button id="startQuizBtn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-5 px-6 rounded-2xl shadow-lg transition-all mb-4 flex flex-col items-center">
                        <span class="text-3xl mb-1">📝</span>
                        <span>立即線上測驗</span>
                        <span class="text-xs font-normal opacity-80">(隨機抽 5 題)</span>
                    </button>

                    <div class="space-y-2">
                        <button id="viewBankBtn" class="w-full bg-blue-50 hover:bg-blue-100 text-blue-600 font-medium py-3 rounded-xl border-2 border-blue-100 flex items-center justify-center">
                            🔍 查看完整題庫
                        </button>

                        <button onclick="preparePrint()" class="w-full bg-green-50 hover:bg-green-100 text-green-600 font-bold py-3 rounded-xl border-2 border-green-200 flex items-center justify-center">
                            🖨️ 輸出紙本測驗 (A4)
                        </button>
                    </div>

                    <div class="mt-6 p-4 bg-gray-50 rounded-2xl text-sm text-gray-500 italic">
                        提示：錄完音後可以下載存成有聲書，讓不識字的小朋友反覆聆聽學習喔！
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 線上測驗 Modal (列印時隱藏) -->
    <div id="quizModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white w-full max-w-2xl rounded-card shadow-2xl p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-orange-600">圈圈村挑戰賽</h3>
                <button onclick="closeQuiz()" class="text-gray-400 hover:text-gray-600 text-3xl font-bold">&times;</button>
            </div>
            <div id="quizBody" class="space-y-6"></div>
            <div id="quizFooter" class="mt-8 flex flex-wrap justify-between items-center gap-4 border-t pt-4">
                <p id="quizProgress" class="text-gray-500 font-bold">第 1 / 5 題</p>
                <div id="feedbackMsg" class="font-bold text-lg"></div>
                <button id="nextBtn" class="hidden bg-blue-600 text-white px-8 py-2 rounded-full font-bold">下一題 ➡️</button>
                <button id="restartBtn" class="hidden bg-green-600 text-white px-8 py-2 rounded-full font-bold">重新抽題</button>
            </div>
        </div>
    </div>

    <!-- 紙本輸出區塊 (預設隱藏，僅列印時顯示) -->
    <div id="paperOutput" class="print-area">
        <h1 class="text-3xl font-bold text-center mb-8">《圈圈村》閱讀理解測驗卷</h1>
        <div class="flex justify-between mb-8 border-b-2 border-black pb-2">
            <span>班級：__________</span>
            <span>座號：__________</span>
            <span>姓名：__________</span>
            <span>得分：__________</span>
        </div>
        <div id="printQuestionContainer">
            <!-- 題目會由 JS 動態生成 -->
        </div>
    </div>

    <script>
        // --- 題庫資料庫 ---
        const questionBank = [
            { q: "從天空中往下看，圈圈村的形狀看起來像什麼呢？", options: ["一個大三角形", "一個甜甜圈", "一塊大餅乾", "一顆愛心"], ans: 1 },
            { q: "圈圈村的人，長相通常具備什麼特徵？", options: ["全身上下都是尖尖的", "鼻子、眼睛、臉都是圓圓的", "每個人都戴著尖尖的帽子", "他們長得非常高大"], ans: 1 },
            { q: "下列哪一個不是圈圈村裡「圓圓的東西」？", options: ["鵝卵石", "路燈", "長椅", "尖尖的鐵剪刀"], ans: 3 },
            { q: "尖尖人阿三出現在西瓜田時，手裡拿著什麼東西？", options: ["圓圓的氣球", "尖尖的鐵剪刀", "一個大籃子", "圓圓的大剪刀"], ans: 1 },
            { q: "尖尖人阿三在逃跑的過程中，不小心弄破了什麼？", options: ["西瓜伯的西瓜", "村長的垃圾桶", "小朋友的氣球", "牆上的大橘貓"], ans: 2 },
            { q: "村民們為什麼要一直追趕尖尖人阿三？", options: ["因為阿三邀請大家跑步", "因為大家誤以為他是小偷", "因為阿三欠村民錢", "因為阿三想搶走西瓜"], ans: 1 },
            { q: "最後是誰出面解釋，才解開了大家的誤會？", options: ["村長", "小小朋友", "大橘貓", "西瓜伯"], ans: 3 },
            { q: "這個故事主要想要告訴我們什麼道理呢？", options: ["多運動對身體好", "尖的東西比較好用", "不應該只看外貌就隨便懷疑別人", "採收西瓜一定要找專業的人"], ans: 2 }
        ];

        // --- 語音辨識與錄音功能 ---
        const storyEditor = document.getElementById('storyEditor');
        const micBtn = document.getElementById('micBtn');
        const micText = document.getElementById('micText');
        const audioControls = document.getElementById('audioControls');
        const audioPlayback = document.getElementById('audioPlayback');
        const downloadBtn = document.getElementById('downloadBtn');

        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';
            recognition.onresult = (e) => {
                let final = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                }
                if (final) storyEditor.value += final;
            };
        }

        micBtn.onclick = async () => {
            if (isRecording) {
                stopRec();
            } else {
                startRec();
            }
        };

        async function startRec() {
            isRecording = true;
            audioChunks = [];
            micBtn.classList.add('voice-active');
            micText.innerText = "錄音中...";
            if (recognition) recognition.start();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/wav' });
                    const url = URL.createObjectURL(blob);
                    audioPlayback.src = url;
                    downloadBtn.href = url;
                    downloadBtn.download = `圈圈村故事錄音_${new Date().toLocaleTimeString()}.wav`;
                    audioControls.classList.remove('hidden');
                };
                mediaRecorder.start();
            } catch (err) { alert("無法開啟錄音功能。"); }
        }

        function stopRec() {
            isRecording = false;
            micBtn.classList.remove('voice-active');
            micText.innerText = "重新錄製";
            if (recognition) recognition.stop();
            if (mediaRecorder) mediaRecorder.stop();
        }

        document.getElementById('clearBtn').onclick = () => {
            if(confirm("清空目前所有內容嗎？")) {
                storyEditor.value = "";
                audioControls.classList.add('hidden');
            }
        };

        // --- 線上測驗邏輯 ---
        let selectedQuestions = [];
        let currentIdx = 0;
        let score = 0;

        document.getElementById('startQuizBtn').onclick = () => {
            selectedQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 5);
            currentIdx = 0;
            score = 0;
            document.getElementById('quizModal').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            const data = selectedQuestions[currentIdx];
            document.getElementById('quizProgress').innerText = `第 ${currentIdx + 1} / 5 題`;
            document.getElementById('feedbackMsg').innerText = "";
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('restartBtn').classList.add('hidden');

            document.getElementById('quizBody').innerHTML = `
                <div class="text-xl font-bold text-gray-800 mb-4">${data.q}</div>
                <div class="grid grid-cols-1 gap-3">
                    ${data.options.map((opt, i) => `
                        <button onclick="checkAns(${i})" class="text-left p-4 rounded-xl border-2 border-gray-100 hover:border-blue-400 hover:bg-blue-50 transition-all font-medium">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        window.checkAns = (idx) => {
            const data = selectedQuestions[currentIdx];
            const btns = document.getElementById('quizBody').querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            if (idx === data.ans) {
                btns[idx].classList.add('bg-green-100', 'border-green-500');
                document.getElementById('feedbackMsg').innerHTML = "<span class='text-green-600'>答對了！</span>";
                score++;
            } else {
                btns[idx].classList.add('bg-red-100', 'border-red-500');
                btns[data.ans].classList.add('bg-green-50', 'border-green-300');
                document.getElementById('feedbackMsg').innerHTML = "<span class='text-red-500'>加油喔！</span>";
            }

            if (currentIdx < 4) document.getElementById('nextBtn').classList.remove('hidden');
            else showResult();
        };

        document.getElementById('nextBtn').onclick = () => { currentIdx++; showQuestion(); };

        function showResult() {
            document.getElementById('quizBody').innerHTML = `
                <div class="text-center py-8">
                    <h4 class="text-3xl font-bold mb-2">測驗結束</h4>
                    <p class="text-2xl text-blue-600">得分：${score * 20}</p>
                </div>
            `;
            document.getElementById('restartBtn').classList.remove('hidden');
            document.getElementById('restartBtn').onclick = () => { document.getElementById('startQuizBtn').click(); };
        }

        window.closeQuiz = () => document.getElementById('quizModal').classList.add('hidden');

        document.getElementById('viewBankBtn').onclick = () => {
            alert("完整題庫共有 " + questionBank.length + " 題。\n\n" + questionBank.map((v, i) => (i+1) + ". " + v.q).join("\n"));
        };

        // --- 紙本輸出功能 ---
        function preparePrint() {
            const container = document.getElementById('printQuestionContainer');
            container.innerHTML = "";

            questionBank.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = "print-question";
                
                // 格式：(       )1. 題目
                let html = `<div>(       ) ${index + 1}. ${item.q}</div>`;
                
                // 選項
                html += `<div class="print-options">`;
                item.options.forEach((opt, i) => {
                    html += `<div>(${String.fromCharCode(65 + i)}) ${opt}</div>`;
                });
                html += `</div>`;
                
                qDiv.innerHTML = html;
                container.appendChild(qDiv);
            });

            window.print();
        }
    </script>
</body>
</html>
